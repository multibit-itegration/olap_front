<main class="vk-launch-page">
  <section class="vk-launch-panel">
    <div class="vk-launch-brand">ОЛАП-ЭКСПРЕСС</div>
    <div class="vk-launch-spinner"></div>

    @if (authStatus() === 'failed') {
      <h1 class="vk-launch-title">Вход через VK</h1>
      <p class="vk-launch-message">{{ authMessage() }}</p>
      <a routerLink="/login" class="vk-launch-button">Обычный вход</a>
    } @else {
      <h1 class="vk-launch-title">Входим через VK</h1>
      <p class="vk-launch-phrase">{{ vkAuthPhrase() }}</p>
    }
  </section>
</main>
