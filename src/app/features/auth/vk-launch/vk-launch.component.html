<div class="auth-container">
  <div class="auth-brand">ОЛАП-ЭКСПРЕСС</div>
  <h1 class="auth-title">Вход</h1>

  <div class="auth-card">
    <div class="telegram-auth-loading vk-auth-loading">
      @if (authStatus() === 'failed') {
        <p class="telegram-auth-title">Входим через VK</p>
        <p class="telegram-auth-phrase vk-auth-message">{{ authMessage() }}</p>
        <a routerLink="/login" class="vk-auth-button">Обычный вход</a>
      } @else {
        <div class="loading-spinner"></div>
        <p class="telegram-auth-title">Входим через VK</p>
        <p class="telegram-auth-phrase">{{ vkAuthPhrase() }}</p>
      }
    </div>
  </div>
</div>
