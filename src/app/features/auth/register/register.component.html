<div class="auth-container">
  <h1 class="auth-title">РЕГИСТРАЦИЯ</h1>

  <div class="auth-card">
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Имя</label>
        <input
          type="text"
          class="form-input"
          [class.error]="hasFieldError('name')"
          formControlName="name"
          placeholder="Введите имя"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Номер телефона</label>
        <input
          type="tel"
          class="form-input"
          [class.error]="hasFieldError('phone')"
          formControlName="phone"
          placeholder="+7 999 999 99 99"
          (input)="formatPhone($event)"
          maxlength="16"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Электронная почта</label>
        <input
          type="email"
          class="form-input"
          [class.error]="hasFieldError('email')"
          formControlName="email"
          placeholder="user@example.com"
        />
      </div>

      <div class="form-group">
        <label class="form-label">Пароль</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword() ? 'text' : 'password'"
            class="form-input"
            [class.error]="hasFieldError('password')"
            formControlName="password"
            placeholder="Введите пароль"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePasswordVisibility()"
            tabindex="-1"
          >
            @if (!showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            }
            @if (showPassword()) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            }
          </button>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="error-message">
          ❌ {{ errorMessage() }}
        </div>
      }

      @if (successMessage()) {
        <div class="success-message">
          ✅ {{ successMessage() }}
        </div>
      }

      <button type="submit" class="submit-button" [disabled]="registerForm.invalid">
        ЗАРЕГИСТРИРОВАТЬСЯ
      </button>

      <div class="footer-link">
        Уже есть аккаунт ? <a routerLink="/login">Войти</a>
      </div>
    </form>
  </div>
</div>
